name = "siftly-beta-signup"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Replace with the target spreadsheet ID (from the sheet URL: /d/<SHEET_ID>/edit)
SHEET_ID = "1AwJgwq992o5M_XWB2W_QZ50u9H-5evPJd8Rp6fbvRi8"
# Comma-separated list of allowed CORS origins. Use "*" to allow any (not recommended).
# Examples: "https://siftly.me,https://xenirio.github.io,http://localhost:5173"
ALLOWED_ORIGINS="https://siftly.me,https://www.siftly.me,https://siftly-me.vee-jirapong.workers.dev,http://localhost:5173"

# Secrets — set via `wrangler secret put`, never commit:
#   GOOGLE_SERVICE_ACCOUNT_JSON  (full JSON of a service account with Sheets write scope)

# Same-origin routes — keeps the browser request on siftly.me, avoiding cross-origin
# preflights that some in-app browsers (FB/IG/LINE webviews) and strict-tracking
# setups (Brave shields, Firefox ETP) drop entirely.
[[routes]]
pattern = "siftly.me/api/beta"
zone_name = "siftly.me"

[[routes]]
pattern = "www.siftly.me/api/beta"
zone_name = "siftly.me"
